<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sólidos Platônicos e seus Duais</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            border: 1px solid #ccc;
            padding: 10px;
        }

        .cell {
            width: 150px;
            height: 150px;
            border: 1px solid #eee;
            position: relative;
        }

        .label-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            text-align: center;
            font-weight: bold;
            margin: 5px 0;
            color: #333;
        }

        .label-cell {
            width: 150px;
            padding: 5px 0;
            border-left: 1px solid transparent;
            border-right: 1px solid transparent;
        }

        /* Linhas verticais separadoras */
        .grid-container .cell:not(:last-child),
        .label-row .label-cell:not(:last-child) {
            border-right: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <div class="grid-container" id="row1"></div>

    <div class="label-row">
        <div class="label-cell">{3, 3}</div>
        <div class="label-cell">{3, 4}</div>
        <div class="label-cell">{4, 3}</div>
        <div class="label-cell">{3, 5}</div>
        <div class="label-cell">{5, 3}</div>
    </div>

    <div class="grid-container" id="row2"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configurações Globais ---
        const colors = {
            tetra: 0xc0392b, // Vermelho
            octa: 0x1abc9c,  // Ciano
            cube: 0xf1c40f,  // Amarelo/Dourado
            ico: 0x2980b9,   // Azul
            dodeca: 0x7f8c8d // Cinza
        };
        const edgeThickness = 0.08; // Espessura das arestas

        // --- Função Fábrica de Sólidos Estruturais ---
        // Cria uma malha de tubos baseada nas arestas de uma geometria
        function createStructuralMesh(geometryBase, color, scale = 1) {
            const material = new THREE.MeshPhongMaterial({ color: color, shininess: 30 });
            const structureGroup = new THREE.Group();

            // Usar EdgesGeometry para encontrar arestas únicas automaticamente
            // Isso resolve problemas com geometrias não indexadas
            const edgesGeo = new THREE.EdgesGeometry(geometryBase);
            const edgePositions = edgesGeo.attributes.position;

            for (let i = 0; i < edgePositions.count; i += 2) {
                const start = new THREE.Vector3().fromBufferAttribute(edgePositions, i);
                const end = new THREE.Vector3().fromBufferAttribute(edgePositions, i + 1);

                const direction = new THREE.Vector3().subVectors(end, start);
                const length = direction.length();

                const edgeGeometry = new THREE.CylinderGeometry(edgeThickness * scale, edgeThickness * scale, length, 8);
                const edgeMesh = new THREE.Mesh(edgeGeometry, material);

                // Posicionar e orientar o cilindro
                edgeMesh.position.copy(start).add(direction.multiplyScalar(0.5));
                edgeMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.normalize());

                structureGroup.add(edgeMesh);
            }

            // Adicionar esferas nos vértices
            // Identificar vértices únicos manualmente (ignora duplicatas de geometrias não indexadas)
            const uniqueVertices = new Set();
            const posAttribute = geometryBase.getAttribute('position');

            for (let i = 0; i < posAttribute.count; i++) {
                const v = new THREE.Vector3().fromBufferAttribute(posAttribute, i);
                // Usar uma chave de string com precisão limitada para filtrar duplicatas
                const key = `${v.x.toFixed(4)},${v.y.toFixed(4)},${v.z.toFixed(4)}`;

                if (!uniqueVertices.has(key)) {
                    uniqueVertices.add(key);
                    const sphereGeo = new THREE.SphereGeometry(edgeThickness * scale * 1.2, 16, 16);
                    const sphereMesh = new THREE.Mesh(sphereGeo, material);
                    sphereMesh.position.copy(v);
                    structureGroup.add(sphereMesh);
                }
            }

            structureGroup.scale.set(scale, scale, scale);
            return structureGroup;
        }

        // --- Função de Inicialização de Cada Célula ---
        function initCell(containerId, solidType, dualType = null) {
            const container = document.createElement('div');
            container.className = 'cell';
            document.getElementById(containerId).appendChild(container);

            const width = container.clientWidth;
            const height = container.clientHeight;

            // Cena, Câmera, Renderizador
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // Fundo branco

            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
            camera.position.set(3, 3, 5);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            // Luzes
            const ambientLight = new THREE.AmbientLight(0xcccccc, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // Controles de Órbita (para interatividade)
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableZoom = false; // Desabilita zoom para não quebrar o layout
            controls.enablePan = false;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;

            // --- Lógica de Criação dos Sólidos ---
            const createSolidData = (type, isInner) => {
                let geo, color, scale = isInner ? 0.55 : 1;
                switch (type) {
                    case 'tetra': geo = new THREE.TetrahedronGeometry(1.5); color = colors.tetra; break;
                    case 'octa': geo = new THREE.OctahedronGeometry(1.4); color = colors.octa; break;
                    case 'cube': geo = new THREE.BoxGeometry(2, 2, 2); color = colors.cube; break;
                    case 'ico': geo = new THREE.IcosahedronGeometry(1.3); color = colors.ico; break;
                    case 'dodeca': geo = new THREE.DodecahedronGeometry(1.3); color = colors.dodeca; break;
                }
                return createStructuralMesh(geo, color, scale);
            };

            // Adicionar Sólido Principal
            const mainSolid = createSolidData(solidType, false);
            scene.add(mainSolid);

            // Adicionar Sólido Dual (se houver)
            if (dualType) {
                const dualSolid = createSolidData(dualType, true);
                // Rotacionar duais específicos para alinhamento visual correto
                if (solidType === 'cube') dualSolid.rotation.set(Math.PI / 4, Math.PI / 4, 0);
                if (solidType === 'octa') mainSolid.rotation.set(Math.PI / 4, 0, 0);
                if (solidType === 'dodeca') dualSolid.rotation.set(0, Math.PI / 5, 0);

                scene.add(dualSolid);
            }

            // Loop de Animação da Célula
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();
        }

        // --- Construção da Tabela (Execução Principal) ---

        // Linha 1: Sólidos Sozinhos
        initCell('row1', 'tetra');
        initCell('row1', 'octa');
        initCell('row1', 'cube');
        initCell('row1', 'ico');
        initCell('row1', 'dodeca');

        // Linha 2: Sólido + Dual
        // Pares duais: Tetra-Tetra, Octa-Cubo, Cubo-Octa, Ico-Dodeca, Dodeca-Ico
        initCell('row2', 'tetra', 'tetra');
        initCell('row2', 'octa', 'cube');
        initCell('row2', 'cube', 'octa');
        initCell('row2', 'ico', 'dodeca');
        initCell('row2', 'dodeca', 'ico');

    </script>
</body>

</html>
